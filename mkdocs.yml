site_name: CompuCell3D
site_url: https://compucell3d.github.io
repo_url: https://github.com/CompuCell3D/CompuCell3D

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
